<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asid | تواصل معنا</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d2ff;
            --glass: rgba(10, 1, 24, 0.8);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0118;
            font-family: "Sofia", sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:url('4.jpg');
        }

        .bg-characters {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            opacity: 0.6;
        }

        .char {
            height: 80%;
            filter: drop-shadow(0 0 20px var(--neon-blue));
            animation: float 4s ease-in-out infinite;
        }



        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px rgba(255, 45, 117, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            animation: fadeIn 1.2s ease-out;
        }

        .portal-wrapper {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .character-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-image: url('anime empire.png'); /* صورة المتجر */
            background-size: cover;
            background-position: center;
            border: 3px solid #fff;
            z-index: 5;
            box-shadow: 0 0 15px white;
        }

        .portal-wrapper::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 4px dashed var(--neon-blue);
            animation: rotatePortal 6s linear infinite;
        }

        .portal-wrapper::after {
            content: "";
            position: absolute;
            width: 120%; height: 120%;
            border-radius: 50%;
            border: 2px solid var(--neon-pink);
            animation: pulsePortal 2s ease-out infinite;
        }

        .brand-name {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-pink);
        }
        .brand-name span { color: var(--neon-pink); }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px; /* فسحة للزر */
        }

        .social-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            transition: 0.4s;
        }

        .social-item i { font-size: 1.5rem; color: var(--neon-blue); }

        .social-item:hover {
            background: var(--neon-blue);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .social-item:hover i { color: white; }

        /* تصميم زر العودة */
        .back-home-btn {
            display: block;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-blue));
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid white;
            transition: 0.3s;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(255,45,117,0.5);
        }

        .back-home-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--neon-pink);
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-pink));
        }

        @keyframes rotatePortal { 100% { transform: rotate(360deg); } }
        @keyframes pulsePortal { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.4); opacity: 0; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .bg-characters { opacity: 0.3; }
            .char { height: 50%; }
        }
    </style>
</head>
<body>


    <div class="contact-card">
        <div class="portal-wrapper">
            <div class="character-logo"></div>
        </div>
        
        <div class="brand-name">Enpire<span> Store</span></div>

        <div class="social-grid">
            <a href="https://facebook.com" class="social-item" target="_blank">
                <i class="fab fa-facebook"></i>
                <span>فيسبوك</span>
            </a>
            <a href="https://instagram.com" class="social-item" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>انستجرام</span>
            </a>
            <a href="https://wa.me/123456789" class="social-item" target="_blank">
                <i class="fab fa-whatsapp"></i>
                <span>واتساب</span>
            </a>
            <a href="https://discord.com" class="social-item" target="_blank">
                <i class="fab fa-discord"></i>
                <span>ديسكورد</span>
            </a>
        </div>

        <!-- زر العودة إلى الرئيسية (الآن داخل الكارد ومرئي) -->

        <a href="home33.html" class="back-home-btn">🏠 العودة للرئيسية</a>
    </div>

</body>
</html>

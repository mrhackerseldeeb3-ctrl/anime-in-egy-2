<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة المتاجر | MANGA HUB EG</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --manga-black: #1a1a1a;
            --neon-pink: #ff2d75;
            --action-blue: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background: #121212; /* خلفية داكنة لإبراز الأزرار */
            color: white;
            padding-bottom: 50px;
            background-image:url('4.jpg');
        }

        /* رأس الصفحة */
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--manga-black), #333);
            border-bottom: 5px solid var(--neon-pink);
            margin-bottom: 40px;
        }

        .title-box {
            display: inline-block;
            border: 4px solid white;
            padding: 10px 30px;
            transform: skew(-10deg);
            background: var(--neon-pink);
            box-shadow: 8px 8px 0 var(--action-blue);
        }

        /* حاوية الأزرار */
        .buttons-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* تصميم الزر "البطاقة" */
        .store-btn {
            display: flex;
            align-items: center;
            background: white;
            color: black;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            border: 3px solid black;
            box-shadow: 6px 6px 0 var(--neon-pink);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .store-btn:hover {
            transform: scale(1.05) rotate(-1deg);
            box-shadow: 10px 10px 0 var(--action-blue);
            background: #f9f9f9;
        }

        /* صورة المتجر المصغرة داخل الزر */
        .store-thumb {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            margin-left: 15px;
            border: 2px solid #ddd;
        }

        .btn-text {
            display: flex;
            flex-direction: column;
        }

        .btn-text .name {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--manga-black);
        }

        .btn-text .desc {
            font-size: 0.8rem;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        /* سهم الانتقال */
        .go-icon {
            margin-right: auto;
            color: var(--neon-pink);
            font-size: 1.5rem;
        }

        /* تذييل الصفحة */
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 30px;
            border-top: 2px solid #333;
        }

        .contact-btn {
            color: var(--action-blue);
            text-decoration: none;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <div class="title-box">
        <h1 style="transform: skew(10deg); font-family: 'Reem Kufi';">كتالوج المتاجر ⚡</h1>
    </div>
    <p style="margin-top: 20px; opacity: 0.8;">اختر متجرك المفضل وانطلق لعالم الأنمي</p>
</header>

<div class="buttons-grid" id="buttonsGrid">
    </div>

<footer>
    <p>MANGA HUB EG - 2026</p>
    <div style="margin-top: 10px;">
        تواصل معنا: <a href="mailto:mrhackerseldeeb3@gmail.com" class="contact-btn">mrhackerseldeeb3@gmail.com</a>
    </div>
</footer>

<script>
    // بياناتك التي قدمتها
    const stores = [
        { file: "anime dokan.png", name: "Anime Dokan", desc: "أجمل منتجات الأنمي في مكان واحد", page: "dokan.html" },
        { file: "anime Empire.png", name: "Anime Empire", desc: "إمبراطورية الأنمي والمانجا", page: "epire.html" },
        { file: "anime stop.jpeg", name: "Anime Stop", desc: "محطتك الأولى لكل جديد", page: "stop.html" },
        { file: "asia.jpg", name: "Asia", desc: "إكسسوارات وتذكارات يابانية", page: "asia.html" },
        { file: "attack.jpg", name: "Attack Store", desc: "قوة الأنمي بين يديك", page: "attack.html" },
        { file: "fuji.jpg", name: "Fuji", desc: "منتجات مستوحاة من جبل فوجي", page: "fuji.html" },
        { file: "Heroszone.jpeg", name: "HeroZene", desc: "لكل بطل معداته", page: "herostore.html" },
        { file: "home.jpg", name: "Home Anime", desc: "ديكورات منزلية بأنمي", page: "home.html" },
        { file: "house.jpg", name: "House Japan", desc: "لمسة يابانية في بيتك", page: "house.html" },
        { file: "japan.jpg", name: "Japan Souvenir", desc: "هدايا تذكارية من اليابان", page: "japan.html" },
        { file: "Kat.jpg", name: "Katana", desc: "أكواب وملصقات أنمي", page: "Kat.html" },
        { file: "Kawaii3.jpg", name: "Kawaii World", desc: "عالم الكيوت واللطافة", page: "Kawaii3.html" },
        { file: "manga2.jpeg", name: "Manga Plus", desc: "آخر إصدارات المانجا", page: "manga.html" },
        { file: "one.jpg", name: "One", desc: "قطعة واحدة لكل فان", page: "one.html" },
        { file: "sokona.jpg", name: "Sokan", desc: "سيوف وأسلحة الأنمي", page: "Sokana.html" },
        { file: "tanjiro.jpg", name: "Teniro", desc: "شخصياتك المفضلة هنا", page: "tanjiro.html" },
        { file: "yuko.jpeg", name: "Yuko", desc: "موديلات حصرية مستوردة", page: "Yuki.html" }
    ];

    const grid = document.getElementById('buttonsGrid');

    stores.forEach(store => {
        const btn = document.createElement('a');
        btn.href = store.page;
        btn.className = 'store-btn';
        
        btn.innerHTML = `
            <img src="${store.file}" class="store-thumb" alt="${store.name}" onerror="this.src='https://via.placeholder.com/60?text=Logo'">
            <div class="btn-text">
                <span class="name">${store.name}</span>
                <span class="desc">${store.desc}</span>
            </div>
            <i class="fas fa-chevron-left go-icon"></i>
        `;
        
        grid.appendChild(btn);
    });
</script>

</body>
</html>

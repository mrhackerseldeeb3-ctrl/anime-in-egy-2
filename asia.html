<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Asid Store | عالم الأنمي</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Sofia&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <style>
        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d2ff;
            --glass: rgba(10, 1, 24, 0.85);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0a0118;
            font-family: 'Cairo', 'Sofia', sans-serif;
            color: white;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(rgba(10, 1, 24, 0.7), rgba(10, 1, 24, 0.7)),
                url('1.jpg'); /* خلفية أنمي بديلة */
            background-size: 50px 50px, cover, cover;
            background-position: center;
            background-attachment: fixed; /* ثبات الخلفية */
        }

        /* طبقة الحركة فوق الخلفية */
        .manga-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 100px, rgba(255, 45, 117, 0.03) 101px, rgba(255, 45, 117, 0.03) 102px);
            z-index: 1;
            pointer-events: none; /* عدم التأثير على التفاعل */
            animation: moveLines 20s linear infinite;
        }

        .bg-characters {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 2%;
            pointer-events: none; /* عدم منع الضغط على الأزرار */
        }

        .char {
            height: 85vh;
            max-height: 600px;
            filter: drop-shadow(0 0 30px var(--neon-blue));
            transition: transform 0.5s;
            z-index: 2;
            object-fit: contain;
            opacity: 0.9;
        }


        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 30px 25px;
            border-radius: 30px;
            border: 3px solid var(--neon-pink);
            box-shadow: 0 0 50px rgba(255, 45, 117, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            z-index: 10;
            position: relative;
            animation: cardPop 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49);
            margin: 20px auto;
        }

        .portal-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .character-logo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-image: url('asia.jpg'); /* لوجو افتراضي */
            background-size: cover;
            background-position: center;
            border: 4px solid white;
            position: relative;
            z-index: 5;
            margin: 5px auto;
        }

        .portal-wrapper::before {
            content: "";
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50%;
            border: 4px dashed var(--neon-blue);
            animation: rotatePortal 5s linear infinite;
        }

        .brand-name {
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .brand-name span { 
            color: var(--neon-pink); 
            text-shadow: 0 0 15px var(--neon-pink);
        }

        .social-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .social-item {
            padding: 12px 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 0.95rem;
            backdrop-filter: blur(5px);
        }

        .social-item i {
            font-size: 1.3rem;
        }

        .social-item:hover {
            background: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: translateY(-3px);
        }

        .back-home-btn {
            margin-top: 25px;
            display: block;
            background: var(--neon-pink);
            color: white;
            padding: 14px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            border: 2px solid white;
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .back-home-btn:hover {
            background: white;
            color: var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
        }

        /* Keyframes */
        @keyframes slideLeft {
            to { transform: translateX(0) scaleX(-1); }
        }
        @keyframes slideRight {
            to { transform: translateX(0); }
        }
        @keyframes rotatePortal {
            100% { transform: rotate(360deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        @keyframes cardPop {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes moveLines {
            0% { background-position: 0 0; }
            100% { background-position: 500px 500px; }
        }

        /* تحسينات للهواتف */
        @media (max-width: 768px) {
            .bg-characters {
                align-items: center;
                padding: 0;
            }
            .char {
                height: auto;
                width: 45%;
                max-height: 50vh;
                object-fit: contain;
                bottom: 0;
            }
            .naruto {
                align-self: flex-end;
                margin-bottom: 10px;
            }
            .tanjiro {
                align-self: flex-end;
                margin-bottom: 10px;
            }
            .contact-card {
                padding: 20px;
                width: 85%;
                max-width: 340px;
            }
            .portal-wrapper {
                width: 100px;
                height: 100px;
            }
            .character-logo {
                width: 90px;
                height: 90px;
            }
            .brand-name {
                font-size: 1.8rem;
            }
            .social-item {
                padding: 10px 5px;
                font-size: 0.85rem;
            }
        }

        /* للشاشات الصغيرة جداً */
        @media (max-width: 480px) {
            .char {
                width: 40%;
            }
            .social-grid {
                gap: 8px;
            }
            .social-item {
                flex-direction: column;
                gap: 5px;
                padding: 10px 3px;
            }
            .social-item i {
                font-size: 1.5rem;
            }
        }

        /* تحسين ظهور الخلفية على الهواتف */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll; /* أفضل للأداء على الهواتف */
            }
        }
    </style>
</head>
<body>

    <div class="manga-lines"></div>


    <div class="contact-card">
        <div class="portal-wrapper">
            <div class="character-logo"></div>
        </div>
        
        <div class="brand-name">ASIA<span> Store</span></div>

        <div class="social-grid">
            <!-- روابط حقيقية مطلوبة من المستخدم -->
            <a href="https://www.facebook.com/share/1UTU5ukiu7/" class="social-item" target="_blank"><i class="fab fa-facebook"></i> فيسبوك</a>
            <a href="https://www.instagram.com/yukianimestore?igsh=MTN5emE5Ymo1Z3gweg==" class="social-item" target="_blank"><i class="fab fa-instagram"></i> انستجرام</a>
            <a href="https://wa.me/201501540557" class="social-item" target="_blank"><i class="fab fa-whatsapp"></i> واتساب</a>
            <a href="#" class="social-item" target="_blank"><i class="fab fa-discord"></i> ديسكورد</a>
        </div>

        <a href="home33.html" class="back-home-btn">🏠 العودة للرئيسية</a>
    </div>

</body>
</html>
